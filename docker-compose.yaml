version: '3.7'

services:
    gateway:
        image: baranbartu/k-api-gateway:latest
        command: sh -c "uvicorn main:app --reload --host 0.0.0.0"
        build:
            context: ./gateway
            dockerfile: Dockerfile
        env_file:
            - .env
        ports:
          - 8001:8000
        depends_on:
          - users
          - orders
        volumes:
          - ./gateway:/app
        environment:
          - USERS_SERVICE_URL=${USERS_SERVICE_URL:-http://users:8082}
          - ORDERS_SERVICE_URL=${ORDERS_SERVICE_URL:-http://orders:8081}
          - SECRET_KEY=${SECRET_KEY:-dev-secret}

    users:
        image: baranbartu/k-users:latest
        command: sh -c "uvicorn main:app --reload --host 0.0.0.0"
        build:
            context: ./users
            dockerfile: Dockerfile
        env_file:
            - .env
        volumes:
          - ./users:/app
        environment:
          - DATABASE_URL=${USERS_DATABASE_URL:-sqlite:///users.db}

    orders:
        image: baranbartu/k-orders:latest
        command: sh -c "uvicorn main:app --reload --host 0.0.0.0"
        build:
            context: ./orders
            dockerfile: Dockerfile
        env_file:
            - .env
        volumes:
          - ./orders:/app
        environment:
          - DATABASE_URL=${ORDERS_DATABASE_URL:-sqlite:///orders.db}
