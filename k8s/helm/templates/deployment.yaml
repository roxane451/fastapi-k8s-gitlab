{{- range $service, $config := .Values.services }}
{{- if $config.enabled | default true }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $service }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ $service }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: {{ $service }}
spec:
  replicas: {{ $config.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $service }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $service }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: {{ $service }}
    spec:
      {{- if $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml $.Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ $service }}
        # CORRIGÉ: Ajout du fallback pour tag avec "latest"
        image: "{{ $config.image.repository }}:{{ $config.image.tag | default "latest" }}"
        imagePullPolicy: {{ $config.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: {{ $config.port }}
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "{{ $config.port }}"
        - name: NODE_ENV
          value: "production"
        - name: SERVICE_NAME
          value: "{{ $service }}"
        {{- if $config.additionalEnv }}
        {{- toYaml $config.additionalEnv | nindent 8 }}
        {{- end }}
        {{- if $config.resources }}
        resources:
          {{- toYaml $config.resources | nindent 10 }}
        {{- end }}
        {{- if $config.livenessProbe }}
        livenessProbe:
          {{- toYaml $config.livenessProbe | nindent 10 }}
        {{- else }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        {{- end }}
        {{- if $config.readinessProbe }}
        readinessProbe:
          {{- toYaml $config.readinessProbe | nindent 10 }}
        {{- else }}
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-{{ $service }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ $service }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: {{ $service }}
spec:
  type: {{ $config.service.type | default "ClusterIP" }}
  ports:
  - port: {{ $config.service.port | default $config.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: {{ $service }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
{{- end }}
{{- end }}

{{- if and .Values.ingress .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $.Release.Name }}-ingress
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ $.Release.Name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
  {{- if .Values.ingress.annotations }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
  {{- range .Values.ingress.hosts }}
  - host: {{ .host | quote }}
    http:
      paths:
      {{- range .paths }}
      - path: {{ .path }}
        pathType: {{ .pathType | default "Prefix" }}
        backend:
          service:
            name: {{ $.Release.Name }}-gateway
            port:
              number: {{ $.Values.services.gateway.service.port | default $.Values.services.gateway.port }}
      {{- end }}
  {{- end }}
{{- end }}