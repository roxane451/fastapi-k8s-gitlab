global:
  imagePullSecrets:
    - name: dockerhub-secret

services:
  gateway:
    enabled: true
    replicaCount: 1
    port: 8080
    image:
      repository: placeholder/literate-giggle-gateway  # Sera overridé par CI
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8080
    additionalEnv: []
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

  orders:
    enabled: true
    replicaCount: 1
    port: 8081
    image:
      repository: placeholder/literate-giggle-orders  # Sera overridé par CI
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8081
    additionalEnv: []
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

  users:
    enabled: true
    replicaCount: 1
    port: 8082
    image:
      repository: placeholder/literate-giggle-users  # Sera overridé par CI
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8082
    additionalEnv: []
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: literate-giggle.local
      paths:
        - path: /
          pathType: Prefix