global:
  namespace: default
  imagePullSecrets:
    - name: dockerhub-secret

services:
  gateway:
    enabled: true
    name: gateway
    replicaCount: 1
    port: 8080
    image:
      repository: roxane451/literate-giggle-gateway
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8080
    env:
      - name: PORT
        value: "8080"
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
  orders:
    enabled: true
    name: orders
    replicaCount: 1
    port: 8081
    image:
      repository: roxane451/literate-giggle-orders
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8081
    env:
      - name: PORT
        value: "8081"
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
  users:
    enabled: true
    name: users
    replicaCount: 1
    port: 8082
    image:
      repository: roxane451/literate-giggle-users
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8082
    env:
      - name: PORT
        value: "8082"
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
