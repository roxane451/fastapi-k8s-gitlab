stages:
  - test
  - deploy

variables:
  KUBECTL_VERSION: "v1.28.0"

image: bitnami/kubectl:latest

before_script:
  - kubectl version --client

lint:
  stage: test
  script:
    - echo "No tests configured yet, exécution de checks basiques"
    - yamllint -c .yamllint.yml . || true

deploy:
  stage: deploy
  environment:
    name: production
    url: https://example.com
  script:
    # GitLab CI variables à configurer en UI: GATEWAY_SECRET_KEY, USERS_DATABASE_URL, ORDERS_DATABASE_URL
    - kubectl create namespace literate-giggle --dry-run=client -o yaml | kubectl apply -f -
    - kubectl create secret generic literate-giggle-gateway-secret --from-literal=SECRET_KEY="$GATEWAY_SECRET_KEY" --dry-run=client -o yaml | kubectl apply -f -
    - kubectl create secret generic literate-giggle-users-secret --from-literal=DATABASE_URL="$USERS_DATABASE_URL" --dry-run=client -o yaml | kubectl apply -f -
    - kubectl create secret generic literate-giggle-orders-secret --from-literal=DATABASE_URL="$ORDERS_DATABASE_URL" --dry-run=client -o yaml | kubectl apply -f -
    - helm upgrade --install literate-giggle ./k8s/helm --namespace literate-giggle --set services.gateway.replicaCount=2 --set services.orders.replicaCount=2 --set services.users.replicaCount=2
  only:
    - main
