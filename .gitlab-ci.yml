# Pipeline CI/CD
stages:
  - build       
  - test        
  - package     
  - deploy-dev  
  - deploy-qa   
  - deploy-staging  
  - deploy-prod 

# Variables globales disponibles pour toutes les étapes de la pipeline.
variables:
  DOCKER_IMAGE: $DOCKER_USERNAME/literate-giggle  
  DOCKER_REGISTRY: docker.io                 # Registre Docker utilisé (Docker Hub)

# Script exécuté avant chaque job (sauf si redéfini dans un job spécifique).
# Ici, il connecte l'utilisateur au registre Docker avec des identifiants.
before_script:
  - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD $DOCKER_REGISTRY

# Job pour construire l'image Docker.
build:
  stage: build  # Associe ce job à l'étape "build"
  image: docker:latest  # Utilise l'image officielle Docker pour exécuter ce job
  services:
    - docker:dind  # Lance un service Docker-in-Docker pour permettre de construire des images
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA .  # Construit une image avec le tag du commit Git
    - docker build -t $DOCKER_IMAGE:latest .         # Construit une image avec le tag "latest"
  only:
    - main    # Exécute ce job uniquement pour la branche "main"
    - develop # Et pour la branche "develop"

# Job pour exécuter les tests unitaires.
test:
  stage: test  # Associe ce job à l'étape "test"
  image: node:16  # Utilise l'image Node.js version 16 pour exécuter les tests
  script:
    - npm install  # Installe les dépendances Node.js
    - npm test     # Exécute les tests (probablement via un script défini dans package.json)
  coverage: '/Lines.*?(\d+(?:\.\d+)?)%/'  # Extrait le pourcentage de couverture de code des tests
  artifacts:
    reports:
      junit: test-results.xml  # Stocke les résultats des tests au format JUnit
      coverage_report:
        coverage_format: cobertura  # Stocke le rapport de couverture au format Cobertura
        path: coverage/cobertura-coverage.xml  # Chemin du fichier de couverture

# Job pour pousser l'image Docker vers le registre.
package:
  stage: package  # Associe ce job à l'étape "package"
  image: docker:latest  # Utilise l'image Docker pour ce job
  services:
    - docker:dind  # Lance Docker-in-Docker pour interagir avec le registre
  script:
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA  # Pousse l'image avec le tag du commit
    - docker push $DOCKER_IMAGE:latest          # Pousse l'image avec le tag "latest"
  only:
    - main    # Exécute ce job uniquement pour la branche "main"
    - develop # Et pour la branche "develop"

# Modèle réutilisable pour les jobs de déploiement (évite la répétition de code).
.deploy_template: &deploy_template
  image: bitnami/kubectl:latest  # Utilise l'image kubectl pour interagir avec Kubernetes
  before_script:
    - echo $KUBE_CONFIG | base64 -d > ~/.kube/config  # Décode la configuration Kubernetes depuis une variable
    - helm repo add stable https://charts.helm.sh/stable  # Ajoute le dépôt Helm stable
    - helm repo update  # Met à jour les dépôts Helm
  script:
    - helm upgrade --install literate-giggle ./k8s/helm  # Déploie ou met à jour l'application via Helm
      --namespace $ENVIRONMENT  # Déploie dans l'espace de noms Kubernetes spécifié
      --set image.tag=$CI_COMMIT_SHA  # Utilise le tag du commit pour l'image
      --set environment=$ENVIRONMENT  # Passe la variable d'environnement au chart Helm
      --wait  # Attend que le déploiement soit complet

# Job pour déployer sur l'environnement de développement.
deploy-dev:
  <<: *deploy_template  # Hérite du modèle de déploiement
  stage: deploy-dev  # Associe ce job à l'étape "deploy-dev"
  variables:
    ENVIRONMENT: dev  # Définit l'environnement comme "dev"
  only:
    - develop  # Exécute ce job uniquement pour la branche "develop"

# Job pour déployer sur l'environnement QA (qualité).
deploy-qa:
  <<: *deploy_template  # Hérite du modèle de déploiement
  stage: deploy-qa  # Associe ce job à l'étape "deploy-qa"
  variables:
    ENVIRONMENT: qa  # Définit l'environnement comme "qa"
  only:
    - develop  # Exécute ce job uniquement pour la branche "develop"
  when: manual  # Nécessite une exécution manuelle (via l'interface GitLab)

# Job pour déployer sur l'environnement de staging.
deploy-staging:
  <<: *deploy_template  # Hérite du modèle de déploiement
  stage: deploy-staging  # Associe ce job à l'étape "deploy-staging"
  variables:
    ENVIRONMENT: staging  # Définit l'environnement comme "staging"
  only:
    - main  # Exécute ce job uniquement pour la branche "main"

# Job pour déployer sur l'environnement de production.
deploy-prod:
  <<: *deploy_template  # Hérite du modèle de déploiement
  stage: deploy-prod  # Associe ce job à l'étape "deploy-prod"
  variables:
    ENVIRONMENT: prod  # Définit l'environnement comme "prod"
  only:
    - main  # Exécute ce job uniquement pour la branche "main"
  when: manual  # Nécessite une exécution manuelle (via l'interface GitLab)
  allow_failure: false  # Échoue la pipeline si ce job échoue